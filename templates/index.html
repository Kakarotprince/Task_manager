<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager API Showcase</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { margin-top: 0; color: #333; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
        .task-list { list-style-type: none; padding: 0; }
        .task-item { background: #f9f9f9; margin-bottom: 10px; padding: 15px; border-radius: 4px; border-left: 5px solid #007bff; display: flex; justify-content: space-between; align-items: center;}
        .delete-btn { background: #dc3545; width: auto; padding: 5px 10px; margin: 0; }
        .delete-btn:hover { background: #c82333; }
        #messageBox { margin-bottom: 15px; padding: 10px; border-radius: 4px; text-align: center; font-weight: bold; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <div id="messageBox" class="hidden"></div>

    <!-- Auth Section -->
    <div id="authSection">
        <h2>Login or Register</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth('/login')">Login</button>
        <button onclick="handleAuth('/register')" style="background: #28a745;">Register</button>
    </div>

    <!-- Task Section -->
    <div id="taskSection" class="hidden">
        <h2>My Tasks</h2>
        <button onclick="logout()" style="background: #6c757d;">Logout</button>
        
        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
            <input type="text" id="newTaskTitle" placeholder="New Task Title">
            <input type="text" id="newTaskDesc" placeholder="Task Description (Optional)">
            <button onclick="createTask()">Add Task</button>
        </div>

        <ul class="task-list" id="taskList"></ul>
    </div>
</div>

<script>
    const API_URL = '';
    let token = localStorage.getItem('access_token');

    // Initialize View
    if (token) {
        toggleView(true);
        fetchTasks();
    }

    function showMessage(msg, isError = false) {
        const box = document.getElementById('messageBox');
        box.textContent = msg;
        box.className = isError ? 'error' : 'success';
        box.style.display = 'block';
        setTimeout(() => box.style.display = 'none', 3000);
    }

    function toggleView(isLoggedIn) {
        document.getElementById('authSection').style.display = isLoggedIn ? 'none' : 'block';
        document.getElementById('taskSection').style.display = isLoggedIn ? 'block' : 'none';
    }

    async function handleAuth(endpoint) {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch(`${API_URL}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (res.ok) {
                if (endpoint === '/login') {
                    token = data.access_token;
                    localStorage.setItem('access_token', token);
                    toggleView(true);
                    fetchTasks();
                    showMessage('Logged in successfully');
                } else {
                    showMessage('Registration successful! Please login.');
                }
            } else {
                showMessage(data.message || 'Authentication failed', true);
            }
        } catch (error) {
            showMessage('Network error', true);
        }
    }

    function logout() {
        token = null;
        localStorage.removeItem('access_token');
        toggleView(false);
        document.getElementById('taskList').innerHTML = '';
        showMessage('Logged out successfully');
    }

    async function fetchTasks() {
        try {
            const res = await fetch(`${API_URL}/tasks`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const tasks = await res.json();
            
            if (res.status === 401) { logout(); return; }

            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach(task => {
                // Apply a strikethrough if the task is completed
                const textStyle = task.completed ? 'text-decoration: line-through; color: #6c757d;' : '';
                
                list.innerHTML += `
                    <li class="task-item">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" 
                                   ${task.completed ? 'checked' : ''} 
                                   onchange="toggleTask(${task.id}, ${task.completed})">
                            <div style="${textStyle}">
                                <strong>${task.title}</strong><br>
                                <small>${task.description || ''}</small>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
                    </li>
                `;
            });
        } catch (error) { showMessage('Failed to load tasks', true); }
    }

    async function createTask() {
        const title = document.getElementById('newTaskTitle').value;
        const description = document.getElementById('newTaskDesc').value;

        if (!title) { showMessage('Title is required', true); return; }

        try {
            const res = await fetch(`${API_URL}/tasks`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ title, description })
            });
            
            if (res.ok) {
                document.getElementById('newTaskTitle').value = '';
                document.getElementById('newTaskDesc').value = '';
                fetchTasks();
                showMessage('Task added');
            }
        } catch (error) { showMessage('Failed to add task', true); }
    }

    async function toggleTask(id, currentStatus) {
        try {
            const res = await fetch(`${API_URL}/tasks/${id}`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                // We send the opposite of the current status
                body: JSON.stringify({ completed: !currentStatus }) 
            });
            
            if (res.ok) { 
                fetchTasks(); // Refresh the list to show the updated status
            } else {
                showMessage('Failed to update task', true);
            }
        } catch (error) { 
            showMessage('Network error while updating', true); 
        }
    }

    async function deleteTask(id) {
        try {
            const res = await fetch(`${API_URL}/tasks/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) { fetchTasks(); showMessage('Task deleted'); }
        } catch (error) { showMessage('Failed to delete task', true); }
    }
</script>
</body>
</html>
